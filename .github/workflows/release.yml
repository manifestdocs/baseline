name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: blc-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            name: blc-darwin-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: blc-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --bin blc --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/blc

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/blc ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            CHANGELOG=$(git log --oneline -20)
          else
            CHANGELOG=$(git log --oneline "${PREV_TAG}..HEAD")
          fi
          # Write to file for the release body
          echo "$CHANGELOG" > changelog.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect all binaries and checksums
          FILES=""
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              FILES="$FILES $file"
            done
          done

          # Create checksums file
          cat artifacts/*/*.sha256 > checksums.txt

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.txt \
            $FILES checksums.txt
